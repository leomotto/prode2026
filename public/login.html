<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Iniciar Sesión — Prode Mundial 2026</title>
<meta name="description" content="Iniciá sesión o registrate para participar en el Prode del Mundial 2026">
<link rel="stylesheet" href="/css/main.css">
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onloadTurnstileCallback" async defer></script>
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
  .auth-wrapper{width:100%;max-width:420px;position:relative;z-index:1}
  .auth-logo{text-align:center;margin-bottom:2rem}
  .auth-logo .trophy{font-size:3rem;display:block;margin-bottom:.5rem}
  .auth-logo h1{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--navy);letter-spacing:.05em;margin-bottom:.25rem}
  [data-theme="dark"] .auth-logo h1{color:#93c5fd}
  .auth-logo p{font-size:.85rem;color:var(--text-dim)}
  .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-lg)}
  [data-theme="dark"] .auth-card{background:#1a1d27;border-color:rgba(255,255,255,.1)}
  .auth-tabs{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
  [data-theme="dark"] .auth-tabs{border-color:rgba(255,255,255,.1)}
  .auth-tab{padding:.875rem;text-align:center;border:none;background:none;color:var(--text-dim);font-size:.9rem;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:var(--transition)}
  .auth-tab.active{color:var(--gold);border-bottom-color:var(--gold);background:var(--gold-dim)}
  [data-theme="dark"] .auth-tab{color:var(--text-dim)}
  [data-theme="dark"] .auth-tab.active{color:#fbbf24;border-color:#fbbf24;background:rgba(251,191,36,.1)}
  .auth-body{padding:1.75rem}
  .auth-panel{display:none}.auth-panel.active{display:block}
  .divider-or{display:flex;align-items:center;gap:.75rem;margin:1.25rem 0;color:var(--text-muted);font-size:.78rem}
  .divider-or::before,.divider-or::after{content:'';flex:1;border-top:1px solid var(--border)}
  [data-theme="dark"] .divider-or::before,[data-theme="dark"] .divider-or::after{border-color:rgba(255,255,255,.1)}
  .btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:.75rem;padding:.75rem;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.9rem;font-weight:600;cursor:pointer;transition:var(--transition)}
  [data-theme="dark"] .btn-google{background:#222636;border-color:rgba(255,255,255,.12);color:#f0f2f8}
  .btn-google:hover{border-color:var(--gold);color:var(--gold)}
  .btn-google svg{width:20px;height:20px;flex-shrink:0}
  .avatar-picker{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.5rem}
  .avatar-option{width:40px;height:40px;border-radius:50%;background:var(--surface-2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.25rem;cursor:pointer;transition:var(--transition)}
  [data-theme="dark"] .avatar-option{background:#222636;border-color:rgba(255,255,255,.12)}
  .avatar-option:hover,.avatar-option.selected{border-color:var(--gold);background:var(--gold-dim)}
  .cf-turnstile{margin:.75rem 0}
  .error-msg{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:var(--radius);padding:.6rem .9rem;font-size:.82rem;color:var(--red);margin-bottom:.75rem;display:none}
  .error-msg.show{display:block}
  .theme-toggle-login{position:fixed;top:1rem;right:1rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.35rem .6rem;font-size:1rem;cursor:pointer;color:var(--text-dim);transition:var(--transition)}
  [data-theme="dark"] .theme-toggle-login{background:#1a1d27;border-color:rgba(255,255,255,.12);color:#9aa3b8}
  .theme-toggle-login:hover{border-color:var(--gold);color:var(--gold)}
</style>
</head>
<body>
<button class="theme-toggle-login" id="theme-btn-login" onclick="Theme.toggle();this.textContent=Theme.isDark()?'☀️':'🌙'" title="Modo oscuro/claro">🌙</button>
<div class="auth-wrapper">
  <div class="auth-logo">
    <span class="trophy">🏆</span>
    <h1>PRODE MUNDIAL 2026</h1>
    <p>¡Competí con tus amigos y ganate la gloria!</p>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Iniciar Sesión</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Registrarse</button>
    </div>
    <div class="auth-body">

      <!-- LOGIN -->
      <div class="auth-panel active" id="panel-login">
        <div id="login-error" class="error-msg"></div>
        <form id="form-login" onsubmit="doLogin(event)">
          <div class="form-group">
            <label class="form-label" for="login-email">Email</label>
            <input class="form-input" id="login-email" type="email" placeholder="tu@email.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label" for="login-pass">Contraseña</label>
            <input class="form-input" id="login-pass" type="password" placeholder="••••••••" required autocomplete="current-password">
          </div>
          <div id="ts-login" style="margin:.75rem 0"></div>
          <button class="btn btn-primary w-full btn-lg mt-2" type="submit" id="btn-login">
            <span id="btn-login-text">Iniciar Sesión</span>
          </button>
        </form>
        <div class="divider-or">o</div>
        <a href="/api/auth/google" class="btn-google">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continuar con Google
        </a>
      </div>

      <!-- REGISTER -->
      <div class="auth-panel" id="panel-register">
        <div id="reg-error" class="error-msg"></div>
        <form id="form-register" onsubmit="doRegister(event)">
          <div class="form-group">
            <label class="form-label" for="reg-name">Nombre para mostrar</label>
            <input class="form-input" id="reg-name" type="text" placeholder="El Messi del prode" required minlength="2" maxlength="50">
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-email">Email</label>
            <input class="form-input" id="reg-email" type="email" placeholder="tu@email.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-pass">Contraseña</label>
            <input class="form-input" id="reg-pass" type="password" placeholder="Mínimo 8 caracteres" required minlength="8">
          </div>
          <div class="form-group">
            <label class="form-label">Tu avatar</label>
            <div class="avatar-picker" id="avatar-picker">
              <span class="avatar-option selected" data-emoji="⚽" onclick="selectAvatar(this)">⚽</span>
              <span class="avatar-option" data-emoji="🇦🇷" onclick="selectAvatar(this)">🇦🇷</span>
              <span class="avatar-option" data-emoji="🏆" onclick="selectAvatar(this)">🏆</span>
              <span class="avatar-option" data-emoji="🦁" onclick="selectAvatar(this)">🦁</span>
              <span class="avatar-option" data-emoji="🐆" onclick="selectAvatar(this)">🐆</span>
              <span class="avatar-option" data-emoji="⚡" onclick="selectAvatar(this)">⚡</span>
              <span class="avatar-option" data-emoji="🔥" onclick="selectAvatar(this)">🔥</span>
              <span class="avatar-option" data-emoji="🎯" onclick="selectAvatar(this)">🎯</span>
            </div>
          </div>
          <div id="ts-register" style="margin:.75rem 0"></div>
          <button class="btn btn-primary w-full btn-lg mt-2" type="submit" id="btn-register">
            <span id="btn-register-text">Crear Cuenta</span>
          </button>
        </form>
        <div class="divider-or">o</div>
        <a href="/api/auth/google" class="btn-google">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Registrarse con Google
        </a>
      </div>

    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
if (Auth.isLogged()) window.location.href = '/';
document.getElementById('theme-btn-login').textContent = Theme.isDark() ? '☀️' : '🌙';

let selectedAvatar = '⚽';
let tsLoginId, tsRegisterId;

// Carga la site key desde el servidor (nunca está hardcodeada en el HTML)
async function initTurnstile() {
  try {
    const cfg = await fetch('/api/config').then(r => r.json());
    const sitekey = cfg.turnstileSiteKey;
    if (!sitekey || !window.turnstile) return;
    tsLoginId    = window.turnstile.render('#ts-login',    { sitekey, theme: Theme.isDark() ? 'dark' : 'light' });
    tsRegisterId = window.turnstile.render('#ts-register', { sitekey, theme: Theme.isDark() ? 'dark' : 'light' });
  } catch { /* Turnstile opcional en dev */ }
}

// Esperar a que el script de Turnstile cargue
if (window.turnstile) {
  initTurnstile();
} else {
  window.onloadTurnstileCallback = initTurnstile;
}

function switchTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('panel-login').classList.toggle('active', tab === 'login');
  document.getElementById('panel-register').classList.toggle('active', tab === 'register');
}

function selectAvatar(el) {
  document.querySelectorAll('.avatar-option').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedAvatar = el.dataset.emoji;
}

function getTurnstileToken(widgetId) {
  if (widgetId === undefined) return '';
  return window.turnstile?.getResponse(widgetId) || '';
}

async function doLogin(e) {
  e.preventDefault();
  const errEl = document.getElementById('login-error');
  errEl.classList.remove('show');
  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  document.getElementById('btn-login-text').textContent = 'Ingresando...';
  try {
    const { token, user } = await api.auth.login({
      email:          document.getElementById('login-email').value,
      password:       document.getElementById('login-pass').value,
      turnstileToken: getTurnstileToken(tsLoginId) || 'dev-bypass',
    });
    Auth.save(token, user);
    window.location.href = '/';
  } catch (err) {
    errEl.textContent = err.message || 'Error al iniciar sesión';
    errEl.classList.add('show');
    if (tsLoginId !== undefined) window.turnstile?.reset(tsLoginId);
  } finally {
    btn.disabled = false;
    document.getElementById('btn-login-text').textContent = 'Iniciar Sesión';
  }
}

async function doRegister(e) {
  e.preventDefault();
  const errEl = document.getElementById('reg-error');
  errEl.classList.remove('show');
  const btn = document.getElementById('btn-register');
  btn.disabled = true;
  document.getElementById('btn-register-text').textContent = 'Creando cuenta...';
  try {
    const { token, user } = await api.auth.register({
      email:          document.getElementById('reg-email').value,
      displayName:    document.getElementById('reg-name').value,
      password:       document.getElementById('reg-pass').value,
      avatar:         selectedAvatar,
      turnstileToken: getTurnstileToken(tsRegisterId) || 'dev-bypass',
    });
    Auth.save(token, user);
    window.location.href = '/';
  } catch (err) {
    errEl.textContent = err.message || 'Error al registrarse';
    errEl.classList.add('show');
    if (tsRegisterId !== undefined) window.turnstile?.reset(tsRegisterId);
  } finally {
    btn.disabled = false;
    document.getElementById('btn-register-text').textContent = 'Crear Cuenta';
  }
}
</script>
</body>
</html>
