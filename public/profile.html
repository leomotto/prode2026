<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mi Perfil — Prode Mundial 2026</title>
<link rel="stylesheet" href="/css/main.css">
<script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
<style>
.profile-grid{display:grid;grid-template-columns:300px 1fr;gap:1.5rem;align-items:start}
@media(max-width:900px){.profile-grid{grid-template-columns:1fr}}
.avatar-picker{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem;max-height:180px;overflow-y:auto;padding:.5rem;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius)}
.avatar-opt{font-size:1.5rem;cursor:pointer;padding:.3rem;border-radius:6px;border:2px solid transparent;transition:all .15s;line-height:1}
.avatar-opt:hover{background:rgba(37,99,235,.1);border-color:var(--blue)}
.avatar-opt.selected{background:rgba(37,99,235,.15);border-color:var(--blue);transform:scale(1.15)}
.profile-card{text-align:center;padding:2rem 1.5rem}
.profile-big-avatar{font-size:5rem;line-height:1;margin-bottom:.75rem}
.profile-display-name{font-size:1.3rem;font-weight:800;color:var(--navy)}
.profile-email{font-size:.85rem;color:var(--text-dim);margin-bottom:1rem}
.stat-bar{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:1rem}
.stat-bar-item{background:var(--surface-2);border-radius:var(--radius);padding:.6rem;text-align:center;border:1px solid var(--border)}
.stat-bar-val{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--navy)}
.stat-bar-label{font-size:.7rem;color:var(--text-dim)}
[data-theme="dark"] .profile-display-name{color:#93c5fd}
[data-theme="dark"] .stat-bar-val{color:#93c5fd}
[data-theme="dark"] .stat-bar-item{background:var(--surface-2);border-color:rgba(255,255,255,.08)}
[data-theme="dark"] .avatar-picker{background:var(--surface-2);border-color:rgba(255,255,255,.1)}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo"><span>🏆</span><div><div>PRODE MUNDIAL</div><small>2026</small></div></a>
    <div class="nav-links">
      <a href="/" class="nav-link">🏠 Inicio</a>
      <a href="/matches" class="nav-link">📅 Partidos</a>
      <a href="/rankings" class="nav-link">🏅 Ranking</a>
      <a href="/groups" class="nav-link">👥 Grupos</a>
      <a href="/admin" class="nav-link" id="nav-admin" style="display:none">🛡 Admin</a>
    </div>
    <div class="nav-user">
      <div class="nav-avatar" id="nav-avatar">⚽</div>
      <span class="nav-username" id="nav-username"></span>
      <button class="btn-theme" onclick="Theme.toggle();this.textContent=Theme.isDark()?'☀️':'🌙'" id="btn-theme">🌙</button>
      <button id="nav-hamburger" class="nav-hamburger" onclick="toggleMobileMenu()" aria-label="Menú"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>

<!-- Mobile Nav Overlay + Drawer -->
<div class="mobile-nav-overlay" id="mobile-nav-overlay" onclick="closeMobileMenu()"></div>
<div class="mobile-nav-drawer" id="mobile-nav-drawer">
  <a href="/" class="mobile-nav-link" onclick="closeMobileMenu()">🏠 Inicio</a>
  <a href="/matches" class="mobile-nav-link" onclick="closeMobileMenu()">📅 Partidos</a>
  <a href="/rankings" class="mobile-nav-link" onclick="closeMobileMenu()">🏅 Ranking</a>
  <a href="/groups" class="mobile-nav-link" onclick="closeMobileMenu()">👥 Grupos</a>
  <a href="/rules" class="mobile-nav-link" onclick="closeMobileMenu()">📖 Reglamento</a>
  <hr class="mobile-nav-divider">
  <a href="/admin" class="mobile-nav-link" id="mobile-nav-admin" style="display:none" onclick="closeMobileMenu()">🛡 Admin</a>
  <a href="/profile" class="mobile-nav-link" onclick="closeMobileMenu()">👤 Mi Perfil</a>
  <button class="mobile-nav-link" onclick="doLogout()">🚪 Salir</button>
  <hr class="mobile-nav-divider">
  <button class="mobile-nav-link" id="mobile-theme-btn" onclick="Theme.toggle();document.getElementById('mobile-theme-btn').textContent=Theme.isDark()?'☀️ Modo claro':'🌙 Modo oscuro'">🌙 Modo oscuro</button>
</div>

<div class="page-wrapper">
  <div class="container" style="padding-top:1.5rem;padding-bottom:3rem">
    <h1 style="font-size:1.6rem;font-weight:800;color:var(--navy);margin-bottom:1.25rem">Mi Perfil</h1>

    <div class="profile-grid">
      <!-- Tarjeta de perfil actual -->
      <div class="card profile-card">
        <div class="profile-big-avatar" id="profile-avatar-display">⚽</div>
        <div class="profile-display-name" id="profile-name-display">Cargando...</div>
        <div class="profile-email" id="profile-email-display"></div>
        <div class="stat-bar">
          <div class="stat-bar-item"><div class="stat-bar-val" id="ps-pts">—</div><div class="stat-bar-label">Puntos</div></div>
          <div class="stat-bar-item"><div class="stat-bar-val" id="ps-rank">—</div><div class="stat-bar-label">Posición</div></div>
          <div class="stat-bar-item"><div class="stat-bar-val" id="ps-preds">—</div><div class="stat-bar-label">Pronosticados</div></div>
          <div class="stat-bar-item"><div class="stat-bar-val" id="ps-exact">—</div><div class="stat-bar-label">Exactos</div></div>
        </div>
      </div>

      <!-- Formulario de edición -->
      <div>
        <div class="card" style="padding:1.5rem;margin-bottom:1rem">
          <h3 style="font-size:1rem;font-weight:700;margin-bottom:1.25rem;color:var(--navy)">✏️ Editar Perfil</h3>

          <div class="form-group">
            <label class="form-label">Nombre para mostrar</label>
            <input class="form-input" id="edit-name" type="text" placeholder="Tu nombre">
          </div>

          <div class="form-group">
            <label class="form-label">Avatar (elegí un emoji)</label>
            <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem">
              <div style="font-size:2.5rem;min-width:2.5rem;text-align:center" id="avatar-preview">⚽</div>
              <input class="form-input" id="edit-avatar-input" type="text" maxlength="4" placeholder="Pegá cualquier emoji" style="width:100px" oninput="document.getElementById('avatar-preview').textContent=this.value||'⚽'">
            </div>
            <div class="avatar-picker" id="avatar-picker"></div>
          </div>

          <div class="form-group" id="password-section" style="display:none">
            <label class="form-label">Nueva contraseña (dejar vacío para no cambiar)</label>
            <input class="form-input" id="edit-password" type="password" placeholder="Nueva contraseña">
          </div>

          <div style="display:flex;gap:.75rem;margin-top:1rem">
            <button class="btn btn-primary" onclick="saveProfile()">💾 Guardar cambios</button>
            <a href="/" class="btn btn-secondary">Cancelar</a>
          </div>
        </div>

        <div class="card" style="padding:1.5rem" id="danger-zone">
          <h3 style="font-size:1rem;font-weight:700;margin-bottom:.75rem;color:var(--red)">⚠️ Zona Peligrosa</h3>
          <button class="btn btn-sm" style="background:var(--red);color:#fff" onclick="confirmLogout()">Cerrar sesión en todos los dispositivos</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
Auth.require();
const user = Auth.getUser();
if (user) {
  document.getElementById('nav-avatar').textContent = user.avatar || '⚽';
  document.getElementById('nav-username').textContent = user.displayName?.split(' ')[0] || '';
  if (user.isAdmin) { document.getElementById('nav-admin').style.display=''; const m=document.getElementById('mobile-nav-admin'); if(m) m.style.display=''; }
  // Pre-fill form
  document.getElementById('edit-name').value = user.displayName || '';
  document.getElementById('edit-avatar-input').value = user.avatar || '';
  document.getElementById('avatar-preview').textContent = user.avatar || '⚽';
  document.getElementById('profile-avatar-display').textContent = user.avatar || '⚽';
  document.getElementById('profile-name-display').textContent = user.displayName || '';
  document.getElementById('profile-email-display').textContent = user.email || '';
  if (!user.googleId) document.getElementById('password-section').style.display = '';
}
document.getElementById('btn-theme').textContent = Theme.isDark() ? '☀️' : '🌙';

// Emoji options
const AVATARS = ['⚽','🏆','🥅','🏟️','🎽','🥇','🥈','🥉','🌟','⭐','🔥','❤️','💪','🦁','🐯','🦅','🐉','👑','🎯','🎪','🚀','💎','🌍','🌎','🌏','🇦🇷','⚡','🏅','🎖️','🏴‍☠️'];
const picker = document.getElementById('avatar-picker');
AVATARS.forEach(e => {
  const btn = document.createElement('button');
  btn.className = 'avatar-opt' + (e === (user?.avatar||'⚽') ? ' selected' : '');
  btn.textContent = e;
  btn.onclick = () => {
    document.querySelectorAll('.avatar-opt').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('edit-avatar-input').value = e;
    document.getElementById('avatar-preview').textContent = e;
  };
  picker.appendChild(btn);
});

// Load stats
Promise.all([api.rankings.me(), api.rankings.all()]).then(([me, all]) => {
  document.getElementById('ps-pts').textContent = me.totalPoints ?? 0;
  document.getElementById('ps-preds').textContent = me.partidos ?? 0;
  document.getElementById('ps-exact').textContent = me.exactos ?? 0;
  const idx = all.findIndex(r => r.userId === user?.id);
  document.getElementById('ps-rank').textContent = idx >= 0 ? '#' + (idx + 1) : '—';
}).catch(() => {});

async function saveProfile() {
  const displayName = document.getElementById('edit-name').value.trim();
  const avatar = document.getElementById('edit-avatar-input').value.trim() || '⚽';
  const password = document.getElementById('edit-password').value;

  if (!displayName) { Toast.warn('Nombre requerido', 'Ingresá tu nombre'); return; }

  const body = { displayName, avatar };
  if (password) body.password = password;

  try {
    const updated = await api.auth.updateMe(body);
    // Update localStorage
    const u = Auth.getUser();
    u.displayName = updated.displayName;
    u.avatar = updated.avatar;
    localStorage.setItem('prode_user', JSON.stringify(u));
    document.getElementById('profile-avatar-display').textContent = updated.avatar;
    document.getElementById('profile-name-display').textContent = updated.displayName;
    document.getElementById('nav-avatar').textContent = updated.avatar;
    document.getElementById('nav-username').textContent = updated.displayName.split(' ')[0];
    Toast.success('¡Perfil actualizado!');
  } catch (err) { Toast.error('Error', err.message); }
}

function confirmLogout() {
  if (confirm('¿Cerrar sesión en todos los dispositivos?')) doLogout();
}
</script>
</body>
</html>
