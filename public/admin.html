<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Prode Mundial 2026</title>
<link rel="stylesheet" href="/css/main.css">
<script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
<style>
.admin-grid{display:grid;grid-template-columns:1fr 300px;gap:1.5rem;align-items:start}
@media(max-width:900px){.admin-grid{grid-template-columns:1fr}}
.admin-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem}
.admin-section h3{font-size:.95rem;font-weight:700;margin-bottom:1rem;color:var(--navy);display:flex;align-items:center;gap:.4rem}
[data-theme="dark"] .admin-section h3{color:var(--text)}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo"><span>🏆</span><div><div>PRODE MUNDIAL</div><small>2026</small></div></a>
    <div class="nav-links">
      <a href="/" class="nav-link">🏠 Inicio</a>
      <a href="/matches" class="nav-link">📅 Partidos</a>
      <a href="/rankings" class="nav-link">🏅 Ranking</a>
      <a href="/admin" class="nav-link active">🛡 Admin</a>
    </div>
    <div class="nav-user">
      <div class="nav-avatar" id="nav-avatar">⚽</div>
      <span class="nav-username" id="nav-username"></span>
      <button class="btn-theme" onclick="Theme.toggle();this.textContent=Theme.isDark()?'☀️':'🌙'" id="btn-theme">🌙</button>
      <button class="btn btn-sm" style="background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)" onclick="doLogout()">Salir</button>
    </div>
  </div>
</nav>

<div class="page-wrapper">
  <div class="container" style="padding-top:1.5rem;padding-bottom:3rem">
    <h1 style="font-size:1.6rem;font-weight:800;color:var(--navy);margin-bottom:1.25rem">Panel de Administración</h1>

    <div class="admin-grid">
      <!-- PARTIDOS -->
      <div>
        <div class="tabs mb-3">
          <button class="tab-btn active" onclick="filterAdmin(this,'')">Todos</button>
          <button class="tab-btn" onclick="filterAdmin(this,'UPCOMING')">⏱ Próximos</button>
          <button class="tab-btn" onclick="filterAdmin(this,'LIVE')">🔴 En Vivo</button>
          <button class="tab-btn" onclick="filterAdmin(this,'FINISHED')">✅ Finalizados</button>
        </div>
        <div id="admin-matches"><div class="spinner"></div></div>
      </div>

      <!-- PANEL LATERAL -->
      <div style="display:flex;flex-direction:column;gap:1rem">
        <div class="admin-section">
          <h3>📊 Estadísticas</h3>
          <div id="admin-stats"><div class="spinner"></div></div>
        </div>
        <div class="admin-section">
          <h3>👥 Usuarios</h3>
          <div id="admin-users"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL RESULTADO -->
<div class="modal-overlay" id="modal-result">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="result-match-title">Cargar Resultado</div>
        <div class="modal-subtitle" id="result-match-subtitle"></div>
      </div>
      <button class="btn-close" onclick="closeModal('modal-result')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="result-match-id">

      <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:1rem;margin-bottom:1.5rem;text-align:center">
        <div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--navy)" id="res-code-a">LOC</div>
          <div style="font-size:.8rem;color:var(--text-dim)" id="res-name-a">Local</div>
        </div>
        <div style="font-size:.85rem;font-weight:700;color:var(--text-muted)">VS</div>
        <div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--navy)" id="res-code-b">VIS</div>
          <div style="font-size:.8rem;color:var(--text-dim)" id="res-name-b">Visitante</div>
        </div>
      </div>

      <div class="score-input-group">
        <div>
          <input class="score-input" id="res-a" type="number" min="0" max="20" value="0">
          <div class="score-team-name" id="res-team-a">Local</div>
        </div>
        <div class="score-separator">—</div>
        <div>
          <input class="score-input" id="res-b" type="number" min="0" max="20" value="0">
          <div class="score-team-name" id="res-team-b">Visitante</div>
        </div>
      </div>

      <hr class="divider">
      <div style="font-size:.8rem;font-weight:700;color:var(--text-dim);margin-bottom:.75rem">Datos Bonus (para calcular puntos extra)</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
        <div class="form-group">
          <label class="form-label">Primer Goleador</label>
          <input class="form-input" id="res-scorer" type="text" placeholder="Apellido">
        </div>
        <div class="form-group">
          <label class="form-label">MVP del partido</label>
          <input class="form-input" id="res-mvp" type="text" placeholder="Apellido">
        </div>
        <div class="form-group">
          <label class="form-label">Tarjetas totales</label>
          <input class="form-input" id="res-cards" type="number" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">Córners totales</label>
          <input class="form-input" id="res-corners" type="number" min="0">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-result')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveResult()">✅ Guardar y Calcular Puntos</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
Auth.require();
const user = Auth.getUser();
if (!user?.isAdmin) {
  Toast.error('Acceso denegado', 'Solo administradores');
  setTimeout(() => location.href = '/', 2000);
}
document.getElementById('nav-avatar').textContent = user?.avatar || '⚽';
document.getElementById('nav-username').textContent = user?.displayName?.split(' ')[0] || '';
document.getElementById('btn-theme').textContent = Theme.isDark() ? '☀️' : '🌙';

let allAdminMatches = [], adminFilter = '';

const STATUS_LABEL = { UPCOMING:'Próximo', LIVE:'EN VIVO', FINISHED:'Finalizado' };
const STATUS_BADGE = { UPCOMING:'badge-upcoming', LIVE:'badge-live', FINISHED:'badge-finished' };

async function loadAdminData() {
  const [matches, users] = await Promise.all([api.admin.matches(), api.admin.users()]);
  allAdminMatches = matches;
  renderAdminMatches();
  renderAdminUsers(users);
  renderAdminStats(matches);
}

function filterAdmin(btn, status) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  adminFilter = status;
  renderAdminMatches();
}

function renderAdminMatches() {
  const filtered = adminFilter ? allAdminMatches.filter(m => m.status === adminFilter) : allAdminMatches;
  const el = document.getElementById('admin-matches');
  if (!filtered.length) { el.innerHTML = '<div class="empty-state"><p>Sin partidos</p></div>'; return; }
  el.innerHTML = filtered.sort((a,b) => new Date(a.date)-new Date(b.date)).map(m => `
    <div class="admin-row">
      <div style="flex:1;min-width:0">
        <div class="admin-row-teams">${teamCode(m.teamAFlag)} ${m.teamAName} <span style="color:var(--text-muted)">vs</span> ${m.teamBName} ${teamCode(m.teamBFlag)}</div>
        <div class="admin-row-date">🕐 ${Fmt.datetime(m.date)} · 📍 ${m.city}</div>
      </div>
      <div style="display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;flex-shrink:0">
        ${m.resultA !== null ? `<span class="badge badge-featured">${m.resultA}–${m.resultB}</span>` : ''}
        <span class="badge ${STATUS_BADGE[m.status]}">${STATUS_LABEL[m.status]}</span>
        <select class="status-select" onchange="changeStatus('${m.id}', this.value)">
          <option value="UPCOMING" ${m.status==='UPCOMING'?'selected':''}>Próximo</option>
          <option value="LIVE"     ${m.status==='LIVE'?'selected':''}>En Vivo</option>
          <option value="FINISHED" ${m.status==='FINISHED'?'selected':''}>Finalizado</option>
        </select>
        <button onclick="toggleFeatured('${m.id}', ${!m.featured})" class="btn btn-secondary btn-sm" title="${m.featured?'Quitar destacado':'Destacar'}">
          ${m.featured ? '⭐' : '☆'}
        </button>
        <button onclick="openResult('${m.id}')" class="btn btn-primary btn-sm">Resultado</button>
      </div>
    </div>`).join('');
}

function renderAdminUsers(users) {
  document.getElementById('admin-users').innerHTML = users.map(u => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--border);gap:.5rem">
      <div style="display:flex;align-items:center;gap:.5rem;min-width:0">
        <span style="font-size:1.2rem">${u.avatar}</span>
        <div>
          <div style="font-size:.85rem;font-weight:600;color:var(--text)">${u.displayName}</div>
          <div style="font-size:.72rem;color:var(--text-dim)">${u.email}</div>
        </div>
      </div>
      <div style="display:flex;gap:.4rem;flex-shrink:0;align-items:center">
        ${u.isAdmin ? '<span class="badge badge-featured">Admin</span>' : ''}
        <button onclick="toggleAdmin('${u.id}', ${!u.isAdmin})" class="btn btn-secondary btn-sm">${u.isAdmin ? 'Quitar Admin' : 'Hacer Admin'}</button>
      </div>
    </div>`).join('');
}

function renderAdminStats(matches) {
  const total = matches.length, finished = matches.filter(m=>m.status==='FINISHED').length,
        live = matches.filter(m=>m.status==='LIVE').length, upcoming = matches.filter(m=>m.status==='UPCOMING').length;
  document.getElementById('admin-stats').innerHTML = `
    <div class="stats-grid" style="grid-template-columns:1fr 1fr;gap:.5rem">
      <div class="stat-card" style="padding:.75rem"><div class="stat-val">${total}</div><div class="stat-label">Total</div></div>
      <div class="stat-card" style="padding:.75rem"><div class="stat-val" style="color:var(--green)">${finished}</div><div class="stat-label">Final</div></div>
      <div class="stat-card" style="padding:.75rem"><div class="stat-val" style="color:var(--red)">${live}</div><div class="stat-label">Vivo</div></div>
      <div class="stat-card" style="padding:.75rem"><div class="stat-val" style="color:var(--blue)">${upcoming}</div><div class="stat-label">Próximo</div></div>
    </div>`;
}

async function changeStatus(id, status) {
  try {
    await api.admin.setStatus(id, status);
    const m = allAdminMatches.find(x => x.id === id);
    if (m) m.status = status;
    renderAdminMatches();
    Toast.success('Estado actualizado', status);
  } catch (err) { Toast.error('Error', err.message); }
}

async function toggleFeatured(id, featured) {
  try {
    await api.admin.setFeatured(id, featured);
    const m = allAdminMatches.find(x => x.id === id);
    if (m) m.featured = featured;
    renderAdminMatches();
  } catch (err) { Toast.error('Error', err.message); }
}

async function toggleAdmin(id, isAdmin) {
  try {
    await api.admin.updateUser(id, { isAdmin });
    Toast.success('Usuario actualizado');
    loadAdminData();
  } catch (err) { Toast.error('Error', err.message); }
}

function openResult(matchId) {
  const m = allAdminMatches.find(x => x.id === matchId);
  if (!m) return;
  document.getElementById('result-match-id').value = matchId;
  document.getElementById('result-match-title').textContent = `${m.teamAName} vs ${m.teamBName}`;
  document.getElementById('result-match-subtitle').textContent = Fmt.datetime(m.date);
  document.getElementById('res-code-a').textContent = teamCode(m.teamAFlag);
  document.getElementById('res-code-b').textContent = teamCode(m.teamBFlag);
  document.getElementById('res-name-a').textContent = m.teamAName;
  document.getElementById('res-name-b').textContent = m.teamBName;
  document.getElementById('res-team-a').textContent = m.teamAName;
  document.getElementById('res-team-b').textContent = m.teamBName;
  document.getElementById('res-a').value = m.resultA ?? 0;
  document.getElementById('res-b').value = m.resultB ?? 0;
  document.getElementById('res-scorer').value = '';
  document.getElementById('res-mvp').value = '';
  document.getElementById('res-cards').value = '';
  document.getElementById('res-corners').value = '';
  openModal('modal-result');
}

async function saveResult() {
  const id = document.getElementById('result-match-id').value;
  const body = {
    resultA: parseInt(document.getElementById('res-a').value)||0,
    resultB: parseInt(document.getElementById('res-b').value)||0,
    realFirstScorer: document.getElementById('res-scorer').value||null,
    realMvp: document.getElementById('res-mvp').value||null,
    realCardsCount: document.getElementById('res-cards').value!==''?parseInt(document.getElementById('res-cards').value):null,
    realCornersCount: document.getElementById('res-corners').value!==''?parseInt(document.getElementById('res-corners').value):null,
  };
  try {
    const { predictionsUpdated } = await api.admin.setResult(id, body);
    Toast.success('¡Resultado guardado!', `${predictionsUpdated} pronósticos actualizados`);
    closeModal('modal-result');
    loadAdminData();
  } catch (err) { Toast.error('Error', err.message); }
}

loadAdminData();
</script>
</body>
</html>
