<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Partidos — Prode Mundial 2026</title>
<link rel="stylesheet" href="/css/main.css">
<script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <span>🏆</span>
      <div><div>PRODE MUNDIAL</div><small>2026</small></div>
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link">🏠 Inicio</a>
      <a href="/matches" class="nav-link active">📅 Partidos</a>
      <a href="/rankings" class="nav-link">🏅 Ranking</a>
      <a href="/admin" class="nav-link" id="nav-admin" style="display:none">🛡 Admin</a>
    </div>
    <div class="nav-user">
      <a href="/profile" class="nav-avatar" id="nav-avatar" title="Mi perfil">⚽</a>
      <span class="nav-username" id="nav-username"></span>
      <button class="btn-theme" onclick="Theme.toggle();this.textContent=Theme.isDark()?'☀️':'🌙'" id="btn-theme">🌙</button>
      <button class="btn btn-sm" style="background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)" onclick="doLogout()">Salir</button>
    </div>
  </div>
</nav>

<div class="page-wrapper">
  <div class="container" style="padding-top:1.5rem;padding-bottom:3rem">

    <!-- Header + search -->
    <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap">
      <h1 style="font-size:1.6rem;font-weight:800;color:var(--navy)">Partidos</h1>
      <div class="search-bar" style="width:240px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search-input" type="text" placeholder="Buscar equipo..." oninput="renderMatches()">
      </div>
    </div>

    <!-- Tabs filtro -->
    <div class="tabs mb-3" id="phase-tabs">
      <button class="tab-btn active" onclick="setFilter(this,'')">Todos</button>
      <button class="tab-btn" onclick="setFilter(this,'arg')">🇦🇷 Argentina</button>
      <button class="tab-btn" onclick="setFilter(this,'GRUPOS')">Grupos</button>
      <button class="tab-btn" onclick="setFilter(this,'OCTAVOS')">Octavos</button>
      <button class="tab-btn" onclick="setFilter(this,'CUARTOS')">Cuartos</button>
      <button class="tab-btn" onclick="setFilter(this,'SEMIFINAL')">Semis</button>
      <button class="tab-btn" onclick="setFilter(this,'FINAL')">🏆 Final</button>
      <button class="tab-btn" onclick="setFilter(this,'UPCOMING')">⏱ Próximos</button>
      <button class="tab-btn" onclick="setFilter(this,'FINISHED')">✅ Finalizados</button>
      <button class="tab-btn" onclick="setFilter(this,'notify')">🔔 Mis alertas</button>
    </div>

    <div id="matches-list"><div class="spinner"></div></div>
  </div>
</div>

<!-- MODAL PRONÓSTICO -->
<div class="modal-overlay" id="modal-prediction">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title">Tu Pronóstico</div>
        <div class="modal-subtitle" id="modal-date"></div>
      </div>
      <button class="btn-close" onclick="closeModal('modal-prediction')">✕</button>
    </div>
    <div class="modal-body">
      <!-- Teams display -->
      <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:1rem;margin-bottom:1.5rem;text-align:center">
        <div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--navy)" id="modal-code-a">BR</div>
          <div style="font-size:.8rem;color:var(--text-dim)" id="modal-name-a">Brasil</div>
        </div>
        <div style="font-size:.8rem;font-weight:700;color:var(--text-muted)">VS</div>
        <div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--navy)" id="modal-code-b">FR</div>
          <div style="font-size:.8rem;color:var(--text-dim)" id="modal-name-b">Francia</div>
        </div>
      </div>

      <!-- Score steppers -->
      <div class="score-stepper-row">
        <div class="score-stepper">
          <div class="score-stepper-label" id="stepper-label-a">Local</div>
          <div class="stepper-controls">
            <button class="stepper-btn" onclick="adjustScore('a',-1)">−</button>
            <div class="stepper-val" id="val-a">0</div>
            <button class="stepper-btn" onclick="adjustScore('a',1)">+</button>
          </div>
        </div>
        <div class="score-sep">—</div>
        <div class="score-stepper">
          <div class="score-stepper-label" id="stepper-label-b">Visitante</div>
          <div class="stepper-controls">
            <button class="stepper-btn" onclick="adjustScore('b',-1)">−</button>
            <div class="stepper-val" id="val-b">0</div>
            <button class="stepper-btn" onclick="adjustScore('b',1)">+</button>
          </div>
        </div>
      </div>

      <!-- Solo MVP bonus -->
      <div class="form-group" style="margin-top:.5rem">
        <label class="form-label">🎯 Bonus: ¿Quién será el MVP del partido? <span style="color:var(--gold);font-size:.7rem">+2 pts</span></label>
        <input class="form-input" id="pred-mvp" type="text" placeholder="Tu respuesta...">
      </div>

      <input type="hidden" id="pred-match-id">
      <input type="hidden" id="pred-id">
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-prediction')">Cancelar</button>
      <button class="btn btn-primary" onclick="savePrediction()" id="btn-save-pred">Confirmar</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
Auth.require();
const user = Auth.getUser();
if (user) {
  document.getElementById('nav-avatar').textContent = user.avatar || user.displayName?.[0] || '⚽';
  document.getElementById('nav-username').textContent = user.displayName?.split(' ')[0] || '';
  if (user.isAdmin) document.getElementById('nav-admin').style.display = '';
}
document.getElementById('btn-theme').textContent = Theme.isDark() ? '☀️' : '🌙';

let allMatches = [], myPredictions = {}, currentFilter = '';
let scoreA = 0, scoreB = 0;

const PHASE_LABEL = { GRUPOS:'Fase de Grupos', DIECISEISAVOS:'1/32 de Final', OCTAVOS:'Octavos', CUARTOS:'Cuartos de Final', SEMIFINAL:'Semifinal', TERCER_PUESTO:'3er Puesto', FINAL:'Final' };
const PHASE_ORDER = { GRUPOS:1, DIECISEISAVOS:2, OCTAVOS:3, CUARTOS:4, SEMIFINAL:5, TERCER_PUESTO:6, FINAL:7 };

async function loadAll() {
  const [matches, preds] = await Promise.all([api.matches.all(), api.predictions.mine()]);
  allMatches = matches;
  myPredictions = Object.fromEntries(preds.map(p => [p.matchId, p]));
  renderMatches();
}

function setFilter(btn, filter) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = filter;
  renderMatches();
}

function renderMatches() {
  const q = document.getElementById('search-input')?.value?.toLowerCase() || '';
  let filtered = allMatches;

  if      (currentFilter === 'arg')    filtered = allMatches.filter(m => m.argentina);
  else if (currentFilter === 'notify') filtered = allMatches.filter(m => Notify.isOn(m.id));
  else if (['UPCOMING','LIVE','FINISHED'].includes(currentFilter)) filtered = allMatches.filter(m => m.status === currentFilter);
  else if (currentFilter) filtered = allMatches.filter(m => m.phase === currentFilter);

  if (q) filtered = filtered.filter(m => m.teamAName.toLowerCase().includes(q) || m.teamBName.toLowerCase().includes(q));

  const el = document.getElementById('matches-list');
  if (!filtered.length) { el.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>No hay partidos en esta categoría</p></div>'; return; }

  const groups = {}, groupPhase = {};
  for (const m of filtered) {
    const key = m.phase === 'GRUPOS' ? `Grupo ${m.groupName||'?'}` : (PHASE_LABEL[m.phase]||m.phase);
    if (!groups[key]) { groups[key] = []; groupPhase[key] = m.phase; }
    groups[key].push(m);
  }

  const sortedGroups = Object.entries(groups).sort(([a],[b]) => {
    const oA = PHASE_ORDER[groupPhase[a]] ?? 99, oB = PHASE_ORDER[groupPhase[b]] ?? 99;
    return oA !== oB ? oA - oB : a.localeCompare(b,'es');
  });

  el.innerHTML = sortedGroups.map(([groupKey, gMatches]) => {
    const sorted = [...gMatches].sort((a,b) => new Date(a.date)-new Date(b.date));
    return `<div class="fixture-group">
      <div class="group-header">
        <div class="group-badge">${groupKey}</div>
        <span class="group-count">${sorted.length} partido${sorted.length!==1?'s':''}</span>
      </div>
      <div class="matches-grid">${sorted.map(renderCard).join('')}</div>
    </div>`;
  }).join('');

  renderEmojis(el);
}

function renderCard(m) {
  const pred = myPredictions[m.id];
  const hasResult = m.resultA !== null && m.resultB !== null;
  const canPredict = m.status === 'UPCOMING';
  const isLive = m.status === 'LIVE';
  const notifyOn = Notify.isOn(m.id);
  const codeA = teamCode(m.teamAFlag), codeB = teamCode(m.teamBFlag);

  const statusBadge = {
    UPCOMING: '<span class="badge badge-upcoming">Próximo</span>',
    LIVE:     '<span class="badge badge-live">🔴 En Vivo</span>',
    FINISHED: '<span class="badge badge-finished">Finalizado</span>',
  }[m.status] || '';

  return `
  <div class="fixture-card ${m.argentina?'argentina':''} ${m.featured?'featured':''} ${isLive?'live-match':''}">
    <div class="fc-head">
      <div class="fc-badges">
        <span class="badge badge-phase">${PHASE_LABEL[m.phase]||m.phase}</span>
        ${m.groupName ? `<span class="badge badge-group">Grupo ${m.groupName}</span>` : ''}
        ${m.featured  ? '<span class="badge badge-featured">Destacado</span>' : ''}
        ${statusBadge}
      </div>
      <div style="display:flex;align-items:center;gap:.3rem">
        ${canPredict ? `<button class="btn-bell ${notifyOn?'active':''}" id="bell-${m.id}" onclick="toggleNotify('${m.id}')" title="Alerta">${notifyOn?'🔔':'🔕'}</button>` : ''}
      </div>
    </div>

    <div class="fc-body">
      <div class="fc-team-home">
        <div class="fc-code">${codeA}</div>
        <div class="fc-flag-sm">${m.teamAFlag}</div>
        <div class="fc-name">${m.teamAName}</div>
      </div>
      <div class="fc-vs-block">
        ${hasResult
          ? `<div class="fc-score-disp">${m.resultA} - ${m.resultB}</div>`
          : isLive
            ? `<div style="font-size:.75rem;font-weight:700;color:var(--red)">🔴 EN VIVO</div>`
            : `<div class="fc-vs">vs</div><div class="fc-time-disp">${Fmt.time(m.date)}</div>`}
        <div style="font-size:.68rem;color:var(--text-muted)">${Fmt.date(m.date)}</div>
      </div>
      <div class="fc-team-away">
        <div class="fc-code">${codeB}</div>
        <div class="fc-flag-sm">${m.teamBFlag}</div>
        <div class="fc-name">${m.teamBName}</div>
      </div>
    </div>

    ${pred ? `
    <div class="fc-pred-row">
      <span class="fc-pred-label">✅ Tu pronóstico:</span>
      <span class="fc-pred-score">${pred.scoreA} - ${pred.scoreB}</span>
      ${pred.pointsTotal !== null ? `<span class="fc-pred-pts">+${pred.pointsTotal} pts</span>` : ''}
    </div>` : ''}

    <div class="fc-foot">
      <span class="fc-venue">🕐 ${Fmt.time(m.date)} &nbsp; 📍 ${m.city}</span>
      ${canPredict
        ? `<button class="btn btn-primary btn-sm" onclick="openPrediction('${m.id}')">${pred?'✏️ Editar':'Pronosticar'}</button>`
        : ''}
    </div>
  </div>`;
}

function adjustScore(side, delta) {
  if (side === 'a') { scoreA = Math.max(0, scoreA + delta); document.getElementById('val-a').textContent = scoreA; }
  else              { scoreB = Math.max(0, scoreB + delta); document.getElementById('val-b').textContent = scoreB; }
}

function openPrediction(matchId) {
  const m = allMatches.find(x => x.id === matchId);
  if (!m) return;
  const pred = myPredictions[matchId];
  const codeA = teamCode(m.teamAFlag), codeB = teamCode(m.teamBFlag);

  document.getElementById('modal-date').textContent = Fmt.datetime(m.date);
  document.getElementById('modal-code-a').textContent = codeA;
  document.getElementById('modal-code-b').textContent = codeB;
  document.getElementById('modal-name-a').textContent = m.teamAName;
  document.getElementById('modal-name-b').textContent = m.teamBName;
  document.getElementById('stepper-label-a').textContent = m.teamAName;
  document.getElementById('stepper-label-b').textContent = m.teamBName;
  document.getElementById('pred-match-id').value = matchId;
  document.getElementById('pred-id').value = pred?.id || '';
  document.getElementById('pred-mvp').value = pred?.mvp || '';

  scoreA = pred?.scoreA ?? 0;
  scoreB = pred?.scoreB ?? 0;
  document.getElementById('val-a').textContent = scoreA;
  document.getElementById('val-b').textContent = scoreB;

  openModal('modal-prediction');
}

function openModal(id)  { document.getElementById(id)?.classList.add('open'); }
function closeModal(id) { document.getElementById(id)?.classList.remove('open'); }

function toggleNotify(matchId) {
  if (Notification.permission === 'default') {
    Notification.requestPermission().then(p => {
      if (p === 'granted') doToggleNotify(matchId);
      else Toast.warn('Notificaciones bloqueadas', 'Permitilas en configuración del navegador');
    });
  } else doToggleNotify(matchId);
}
function doToggleNotify(matchId) {
  const on = Notify.toggle(matchId);
  const btn = document.getElementById(`bell-${matchId}`);
  if (btn) { btn.textContent = on ? '🔔' : '🔕'; btn.classList.toggle('active', on); }
  Toast.show(on ? 'Alerta activada 🔔' : 'Alerta desactivada', null, on ? 'success' : 'info', 2000);
}

async function savePrediction() {
  const matchId = document.getElementById('pred-match-id').value;
  const predId  = document.getElementById('pred-id').value;
  const btn = document.getElementById('btn-save-pred');
  btn.disabled = true; btn.textContent = 'Guardando...';
  try {
    const body = { matchId, scoreA, scoreB, mvp: document.getElementById('pred-mvp').value || null };
    const saved = predId ? await api.predictions.update(predId, body) : await api.predictions.create(body);
    myPredictions[matchId] = saved;
    Toast.success('¡Pronóstico guardado!', `${scoreA} — ${scoreB}`);
    closeModal('modal-prediction');
    renderMatches();
  } catch (err) {
    Toast.error('Error', err.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Confirmar';
  }
}

function Toast_show(title, msg, type, dur) { Toast.show(title, msg, type, dur); }

loadAll().catch(() => {
  document.getElementById('matches-list').innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>Error al cargar. Recargá la página.</p></div>';
});
</script>
</body>
</html>
