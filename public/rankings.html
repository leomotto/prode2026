<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta charset="UTF-8">
<script>(function(){var t=localStorage.getItem('prode_theme')||'light';document.documentElement.setAttribute('data-theme',t)})();</script>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ranking — Prode Mundial 2026</title>
<link rel="stylesheet" href="/css/main.css">
<script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo"><span>🏆</span><div><div>PRODE MUNDIAL</div><small>2026</small></div></a>
    <div class="nav-links">
      <a href="/" class="nav-link">🏠 Inicio</a>
      <a href="/matches" class="nav-link">📅 Partidos</a>
      <a href="/rankings" class="nav-link active">🏅 Ranking</a>
      <a href="/standings" class="nav-link">⚽ Torneo</a>
      <a href="/groups" class="nav-link">👥 Grupos</a>
      <a href="/rules" class="nav-link">📖 Reglamento</a>
      <a href="/admin" class="nav-link" id="nav-admin" style="display:none">🛡 Admin</a>
    </div>
    <div class="nav-user">
      <a href="/profile" class="nav-avatar" id="nav-avatar" title="Mi perfil">⚽</a>
      <span class="nav-username" id="nav-username"></span>
      <button class="btn-theme" onclick="Theme.toggle();this.textContent=Theme.isDark()?'☀️':'🌙'" id="btn-theme">🌙</button>
      <button class="btn-exit btn btn-sm" style="background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)" onclick="doLogout()">Salir</button>
      <button id="nav-hamburger" class="nav-hamburger" onclick="toggleMobileMenu()" aria-label="Menú"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>

<!-- Mobile Nav Overlay + Drawer -->
<div class="mobile-nav-overlay" id="mobile-nav-overlay" onclick="closeMobileMenu()"></div>
<div class="mobile-nav-drawer" id="mobile-nav-drawer">
  <a href="/" class="mobile-nav-link" onclick="closeMobileMenu()">🏠 Inicio</a>
  <a href="/matches" class="mobile-nav-link" onclick="closeMobileMenu()">📅 Partidos</a>
  <a href="/rankings" class="mobile-nav-link" onclick="closeMobileMenu()">🏅 Ranking</a>
  <a href="/standings" class="mobile-nav-link" onclick="closeMobileMenu()">⚽ Torneo</a>
  <a href="/groups" class="mobile-nav-link" onclick="closeMobileMenu()">👥 Grupos</a>
  <a href="/rules" class="mobile-nav-link" onclick="closeMobileMenu()">📖 Reglamento</a>
  <hr class="mobile-nav-divider">
  <a href="/admin" class="mobile-nav-link" id="mobile-nav-admin" style="display:none" onclick="closeMobileMenu()">🛡 Admin</a>
  <a href="/profile" class="mobile-nav-link" onclick="closeMobileMenu()">👤 Mi Perfil</a>
  <button class="mobile-nav-link" onclick="doLogout()">🚪 Salir</button>
  <hr class="mobile-nav-divider">
  <button class="mobile-nav-link" id="mobile-theme-btn" onclick="Theme.toggle();document.getElementById('mobile-theme-btn').textContent=Theme.isDark()?'☀️ Modo claro':'🌙 Modo oscuro'">🌙 Modo oscuro</button>
</div>

<div class="page-wrapper">
  <div class="container" style="padding-top:1.5rem;padding-bottom:3rem">
    <h1 style="font-size:1.6rem;font-weight:800;color:var(--navy);margin-bottom:1.25rem">Tabla de Posiciones</h1>

    <!-- Tabs: Global por fase + Mis grupos -->
    <div class="tabs mb-3" id="ranking-tabs">
      <button class="tab-btn active" onclick="loadRanking(this,'')">🌐 General</button>
      <button class="tab-btn" onclick="loadRanking(this,'GRUPOS')">Grupos</button>
      <button class="tab-btn" onclick="loadRanking(this,'DIECISEISAVOS')">Dieciseisavos</button>
      <button class="tab-btn" onclick="loadRanking(this,'OCTAVOS')">Octavos</button>
      <button class="tab-btn" onclick="loadRanking(this,'CUARTOS')">Cuartos</button>
      <button class="tab-btn" onclick="loadRanking(this,'SEMIFINAL')">Semis</button>
      <button class="tab-btn" onclick="loadRanking(this,'FINAL')">🏆 Final</button>
      <!-- Group tabs injected by JS -->
    </div>

    <!-- Sub-tabs de fase para grupos (oculto por defecto) -->
    <div id="group-phase-tabs" style="display:none;margin-bottom:.75rem">
      <div class="tabs" style="background:var(--surface-2);border:1px solid var(--border)">
        <button class="tab-btn active" onclick="selectGroupPhase(this,'')">Todos</button>
        <button class="tab-btn" onclick="selectGroupPhase(this,'GRUPOS')">Grupos</button>
        <button class="tab-btn" onclick="selectGroupPhase(this,'DIECISEISAVOS')">Dieciseisavos</button>
        <button class="tab-btn" onclick="selectGroupPhase(this,'OCTAVOS')">Octavos</button>
        <button class="tab-btn" onclick="selectGroupPhase(this,'CUARTOS')">Cuartos</button>
        <button class="tab-btn" onclick="selectGroupPhase(this,'SEMIFINAL')">Semis</button>
        <button class="tab-btn" onclick="selectGroupPhase(this,'FINAL')">Final</button>
      </div>
    </div>

    <div id="podium-section"></div>

    <div class="card" style="padding:0;overflow:hidden">
      <div id="ranking-table-container"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<script src="/js/api.js?v=1.4.8"></script>
<script>
Auth.require();
const user = Auth.getUser();
if (user) {
  document.getElementById('nav-avatar').textContent = user.avatar || '⚽';
  document.getElementById('nav-username').textContent = user.displayName?.split(' ')[0] || '';
  if (user.isAdmin) { document.getElementById('nav-admin').style.display=''; const m=document.getElementById('mobile-nav-admin'); if(m) m.style.display=''; }
}
document.getElementById('btn-theme').textContent = Theme.isDark() ? '☀️' : '🌙';

const PHASE_LABEL = { GRUPOS:'Grupos', DIECISEISAVOS:'Acumulado hasta Dieciseisavos', OCTAVOS:'Acumulado hasta Octavos', CUARTOS:'Acumulado hasta Cuartos', SEMIFINAL:'Acumulado hasta Semifinal', FINAL:'Acumulado hasta Final' };

let activeGroupId = null, activeGroupName = '';

async function loadRanking(btn, phase) {
  activeGroupId = null;
  document.getElementById('group-phase-tabs').style.display = 'none';
  document.querySelectorAll('#ranking-tabs .tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('ranking-table-container').innerHTML = '<div class="spinner"></div>';
  try {
    const ranking = await api.rankings.all(phase);
    renderRanking(ranking, phase ? PHASE_LABEL[phase] || phase : null);
  } catch {
    document.getElementById('ranking-table-container').innerHTML = '<div class="empty-state"><p>Error al cargar</p></div>';
  }
}

async function loadGroupRanking(btn, groupId, groupName, phase) {
  activeGroupId = groupId;
  activeGroupName = groupName;
  document.getElementById('group-phase-tabs').style.display = '';
  // Reset phase sub-tabs
  if (!phase) {
    document.querySelectorAll('#group-phase-tabs .tab-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  }
  document.querySelectorAll('#ranking-tabs .tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('ranking-table-container').innerHTML = '<div class="spinner"></div>';
  try {
    const { ranking } = await api.groups.ranking(groupId, phase || '');
    renderRanking(ranking, null, groupName, phase ? PHASE_LABEL[phase] || phase : null);
  } catch(e) {
    document.getElementById('ranking-table-container').innerHTML = `<div class="empty-state"><p>${e.message}</p></div>`;
  }
}

function selectGroupPhase(btn, phase) {
  document.querySelectorAll('#group-phase-tabs .tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadGroupRanking(document.querySelector('#ranking-tabs .tab-btn.active'), activeGroupId, activeGroupName, phase);
}

function renderRanking(ranking, phaseLabel = null, groupName = null, groupPhaseLabel = null) {
  const myId = Auth.getUser()?.id;
  const podiumEl = document.getElementById('podium-section');

  if (ranking.length >= 3) {
    const [first, second, third] = ranking;
    podiumEl.innerHTML = `<div class="podium mb-3">
      <div class="podium-item podium-2"><div class="podium-crown">🥈</div><div class="podium-avatar">${second.avatar}</div><div class="podium-name podium-name-clip">${second.displayName}</div><div class="podium-pts">${second.totalPoints}</div></div>
      <div class="podium-item podium-1"><div class="podium-crown">🥇</div><div class="podium-avatar podium-avatar-lg">${first.avatar}</div><div class="podium-name podium-name-clip">${first.displayName}</div><div class="podium-pts podium-pts-lg">${first.totalPoints}</div></div>
      <div class="podium-item podium-3"><div class="podium-crown">🥉</div><div class="podium-avatar">${third.avatar}</div><div class="podium-name podium-name-clip">${third.displayName}</div><div class="podium-pts">${third.totalPoints}</div></div>
    </div>`;
  } else { podiumEl.innerHTML = ''; }

  if (!ranking.length) {
    document.getElementById('ranking-table-container').innerHTML =
      '<div class="empty-state" style="padding:3rem"><div class="icon">🏆</div><p>Sin resultados para esta fase todavía</p></div>';
    return;
  }

  const subtitle = groupName
    ? `<div style="font-size:.78rem;color:var(--text-dim);padding:.6rem 1rem .25rem">${groupPhaseLabel ? `Fase: ${groupPhaseLabel}` : 'Todos los pronósticos'}</div>`
    : (phaseLabel ? `<div style="font-size:.78rem;color:var(--text-dim);padding:.6rem 1rem .25rem">Fase: ${phaseLabel}</div>` : '');

  document.getElementById('ranking-table-container').innerHTML = subtitle + `
    <table class="ranking-table">
      <thead>
        <tr>
          <th style="width:44px">#</th>
          <th>Participante</th>
          <th style="text-align:right">Pts</th>
          <th style="text-align:center">Exactos</th>
          <th style="text-align:center">Ganador</th>
          <th style="text-align:center">% Acierto</th>
          <th style="text-align:center">Partidos</th>
        </tr>
      </thead>
      <tbody>
        ${ranking.map(r => `
          <tr class="${r.userId===myId?'me':''} rank-${r.rank}">
            <td class="rank-pos">${r.rank<=3?['🥇','🥈','🥉'][r.rank-1]:r.rank}</td>
            <td><div class="rank-user">
              <div class="rank-avatar">${r.avatar||'⚽'}</div>
              <div>
                <div class="rank-name">${r.displayName}${r.userId===myId?' <span style="font-size:.7rem;color:var(--gold)">(vos)</span>':''}</div>
                ${r.isOwner ? '<div style="font-size:.68rem;color:var(--text-dim)">👑 Creador</div>' : ''}
              </div>
            </div></td>
            <td class="rank-points">${r.totalPoints}</td>
            <td style="text-align:center"><span class="badge badge-featured">${r.exactos ?? '—'}</span></td>
            <td style="text-align:center;color:var(--green);font-weight:700">${r.ganadores ?? '—'}</td>
            <td style="text-align:center;color:var(--text-dim);font-size:.82rem">${r.winRate != null ? r.winRate + '%' : '—'}</td>
            <td style="text-align:center;color:var(--text-dim)">${r.partidos}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

// Cargar ranking global y grupos del usuario
loadRanking(null, '');
api.groups.mine().then(groups => {
  if (!groups.length) return;
  const tabsEl = document.getElementById('ranking-tabs');
  const sep = document.createElement('span');
  sep.style.cssText = 'width:1px;background:var(--border);display:inline-block;height:1.5rem;margin:0 .25rem;align-self:center';
  tabsEl.appendChild(sep);
  groups.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.textContent = `👥 ${g.name}`;
    btn.onclick = () => loadGroupRanking(btn, g.id, g.name);
    tabsEl.appendChild(btn);
  });
}).catch(() => {});
</script>
</body>
</html>
