<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ranking — Prode Mundial 2026</title>
<link rel="stylesheet" href="/css/main.css">
<script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo"><span>🏆</span><div><div>PRODE MUNDIAL</div><small>2026</small></div></a>
    <div class="nav-links">
      <a href="/" class="nav-link">🏠 Inicio</a>
      <a href="/matches" class="nav-link">📅 Partidos</a>
      <a href="/rankings" class="nav-link active">🏅 Ranking</a>
      <a href="/admin" class="nav-link" id="nav-admin" style="display:none">🛡 Admin</a>
    </div>
    <div class="nav-user">
      <div class="nav-avatar" id="nav-avatar">⚽</div>
      <span class="nav-username" id="nav-username"></span>
      <button class="btn-theme" onclick="Theme.toggle();this.textContent=Theme.isDark()?'☀️':'🌙'" id="btn-theme">🌙</button>
      <button class="btn btn-sm" style="background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)" onclick="doLogout()">Salir</button>
    </div>
  </div>
</nav>

<div class="page-wrapper">
  <div class="container" style="padding-top:1.5rem;padding-bottom:3rem">
    <h1 style="font-size:1.6rem;font-weight:800;color:var(--navy);margin-bottom:1.25rem">Tabla de Posiciones</h1>

    <div class="tabs mb-3">
      <button class="tab-btn active" onclick="loadRanking(this,'')">🌐 General</button>
      <button class="tab-btn" onclick="loadRanking(this,'GRUPOS')">Grupos</button>
      <button class="tab-btn" onclick="loadRanking(this,'OCTAVOS')">Octavos</button>
      <button class="tab-btn" onclick="loadRanking(this,'CUARTOS')">Cuartos</button>
      <button class="tab-btn" onclick="loadRanking(this,'SEMIFINAL')">Semis</button>
      <button class="tab-btn" onclick="loadRanking(this,'FINAL')">🏆 Final</button>
    </div>

    <div id="podium-section"></div>

    <div class="card" style="padding:0;overflow:hidden">
      <div id="ranking-table-container"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
Auth.require();
const user = Auth.getUser();
if (user) {
  document.getElementById('nav-avatar').textContent = user.avatar || '⚽';
  document.getElementById('nav-username').textContent = user.displayName?.split(' ')[0] || '';
  if (user.isAdmin) document.getElementById('nav-admin').style.display = '';
}
document.getElementById('btn-theme').textContent = Theme.isDark() ? '☀️' : '🌙';

async function loadRanking(btn, phase) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('ranking-table-container').innerHTML = '<div class="spinner"></div>';
  try {
    const ranking = await api.rankings.all(phase);
    renderRanking(ranking);
  } catch {
    document.getElementById('ranking-table-container').innerHTML = '<div class="empty-state"><p>Error al cargar</p></div>';
  }
}

function renderRanking(ranking) {
  const myId = Auth.getUser()?.id;
  const podiumEl = document.getElementById('podium-section');

  if (ranking.length >= 3) {
    const [first, second, third] = ranking;
    podiumEl.innerHTML = `<div class="podium mb-3">
      <div class="podium-item podium-2"><div class="podium-crown">🥈</div><div class="podium-avatar">${second.avatar}</div><div class="podium-name">${second.displayName}</div><div class="podium-pts">${second.totalPoints}</div></div>
      <div class="podium-item podium-1"><div class="podium-crown">🥇</div><div class="podium-avatar" style="font-size:2.5rem">${first.avatar}</div><div class="podium-name">${first.displayName}</div><div class="podium-pts" style="font-size:1.6rem">${first.totalPoints}</div></div>
      <div class="podium-item podium-3"><div class="podium-crown">🥉</div><div class="podium-avatar">${third.avatar}</div><div class="podium-name">${third.displayName}</div><div class="podium-pts">${third.totalPoints}</div></div>
    </div>`;
  } else { podiumEl.innerHTML = ''; }

  if (!ranking.length) {
    document.getElementById('ranking-table-container').innerHTML =
      '<div class="empty-state" style="padding:3rem"><div class="icon">🏆</div><p>El ranking se actualizará cuando se carguen los primeros resultados</p></div>';
    return;
  }

  document.getElementById('ranking-table-container').innerHTML = `
    <table class="ranking-table">
      <thead>
        <tr>
          <th style="width:50px">#</th>
          <th>Jugador</th>
          <th>Pts</th>
          <th>Exactos</th>
          <th>Ganador</th>
          <th>Bonus</th>
          <th>Partidos</th>
        </tr>
      </thead>
      <tbody>
        ${ranking.map(r => `
          <tr class="${r.userId===myId?'me':''} rank-${r.rank}">
            <td class="rank-pos">${r.rank<=3?['🥇','🥈','🥉'][r.rank-1]:r.rank}</td>
            <td><div class="rank-user">
              <div class="rank-avatar">${r.avatar}</div>
              <div>
                <div class="rank-name">${r.displayName}${r.userId===myId?' <span style="font-size:.7rem;color:var(--gold)">(vos)</span>':''}</div>
              </div>
            </div></td>
            <td class="rank-points">${r.totalPoints}</td>
            <td><span class="badge badge-featured">${r.exactos}</span></td>
            <td style="color:var(--green);font-weight:700">${r.ganadores}</td>
            <td style="color:var(--blue)">${r.bonusTotal}</td>
            <td style="color:var(--text-dim)">${r.partidos}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

loadRanking(null, '');
</script>
</body>
</html>
