name: Deploy to Alwaysdata

on:
  push:
    branches: [ main ]

# ── Secrets necesarios en GitHub (Settings → Secrets → Actions) ──────────────
# ALWAYSDATA_SSH_HOST   → ssh-muchacholoco.alwaysdata.net
# ALWAYSDATA_SSH_USER   → muchacholoco
# ALWAYSDATA_SSH_KEY    → contenido completo de la clave privada SSH (ed25519)
# ALWAYSDATA_SITE_ID    → número del sitio (en la URL del panel al editar el sitio)
# ALWAYSDATA_API_KEY    → API key generada en panel → Account → API Keys
# ALWAYSDATA_ACCOUNT    → muchacholoco
# ─────────────────────────────────────────────────────────────────────────────
# Si ya tenés secrets con otros nombres, mapeá aquí:
#   ${{ secrets.TU_SECRET_EXISTENTE }}
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  deploy:
    name: 🚀 Deploy SSH → Alwaysdata
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Checkout código
        uses: actions/checkout@v4

      - name: 🔑 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.ALWAYSDATA_SSH_HOST }}
          username: ${{ secrets.ALWAYSDATA_SSH_USER }}
          key:      ${{ secrets.ALWAYSDATA_SSH_KEY }}
          port:     22
          script: |
            set -e
            cd $HOME/prode2026

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📦 Installing dependencies..."
            npm ci --omit=dev

            echo "⚙️  Generating Prisma client..."
            npx prisma generate

            echo "🗄️  Running DB migrations..."
            npx prisma migrate deploy

            echo "✅ Deploy listo — reiniciando sitio..."

      - name: 🔄 Restart site via Alwaysdata API
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://api.alwaysdata.com/v1/site/${{ secrets.ALWAYSDATA_SITE_ID }}/restart/" \
            -u "${{ secrets.ALWAYSDATA_API_KEY }} account=${{ secrets.ALWAYSDATA_ACCOUNT }}:" \
            -H "Content-Type: application/json"
