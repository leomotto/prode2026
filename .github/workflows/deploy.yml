name: Deploy to Alwaysdata

on:
  push:
    branches: [ main ]

# ── Secrets necesarios ────────────────────────────────────────────────────────
# ALWAYSDATA_SSH_HOST  → ssh-muchacholoco.alwaysdata.net
# ALWAYSDATA_SSH_USER  → muchacholoco
# ALWAYSDATA_SSH_KEY   → clave privada SSH (ed25519, bloque completo)
# ALWAYSDATA_SITE_ID   → número del sitio (URL del panel)
# ALWAYSDATA_API_KEY   → API key de Alwaysdata
# ALWAYSDATA_ACCOUNT   → muchacholoco
# GH_PAT             → Personal Access Token con scope "repo" (para git pull)
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  deploy:
    name: 🚀 Deploy SSH → Alwaysdata
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Checkout código
        uses: actions/checkout@v4

      - name: 🔑 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.ALWAYSDATA_SSH_HOST }}
          username: ${{ secrets.ALWAYSDATA_SSH_USER }}
          key:      ${{ secrets.ALWAYSDATA_SSH_KEY }}
          port:     22
          envs:     GH_PAT
          script: |
            set -e
            cd $HOME/prode2026

            echo "🔗 Actualizando credenciales git..."
            git remote set-url origin https://leomotto:${GH_PAT}@github.com/leomotto/prode2026.git

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📦 Instalando dependencias..."
            npm ci --omit=dev

            echo "⚙️  Generando Prisma client..."
            npx prisma generate

            echo "🗄️  Aplicando migraciones DB..."
            npx prisma migrate deploy

            echo "✅ Código actualizado."
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: 🔄 Reiniciar sitio en Alwaysdata
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://api.alwaysdata.com/v1/site/${{ secrets.ALWAYSDATA_SITE_ID }}/restart/" \
            -u "${{ secrets.ALWAYSDATA_API_KEY }} account=${{ secrets.ALWAYSDATA_ACCOUNT }}:" \
            -H "Content-Type: application/json")
          echo "Alwaysdata API response: $STATUS"
          if [ "$STATUS" != "204" ] && [ "$STATUS" != "200" ]; then
            echo "⚠️  Restart puede haber fallado (HTTP $STATUS) - verificar manualmente"
          else
            echo "✅ Sitio reiniciado correctamente"
          fi
