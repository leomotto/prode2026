name: Deploy to Alwaysdata

on:                                                                                                              
      push:                                                                                                          
        branches:                                                                                                    
          - main                                                                                                     
      workflow_dispatch:
  
    jobs:
      deploy:
        name: Deploy to Alwaysdata Server
        runs-on: ubuntu-latest
  
        steps:
          - name: Checkout Repository
            uses: actions/checkout@v4
  
          - name: Generate version.json
            run: |
              GIT_HASH=$(git rev-parse --short HEAD 2>/dev/null || echo "dev")
              GIT_DATE=$(git log -1 --format="%cd" --date=format:"%Y-%m-%d" 2>/dev/null || date +%Y-%m-%d)           
              echo "{\"hash\":\"${GIT_HASH}\",\"date\":\"${GIT_DATE}\"}" > version.json
              echo "📌 Versión generada: ${GIT_HASH} (${GIT_DATE})"          
  
          - name: Set up SSH Key
            env:
              SSH_PRIVATE_KEY: ${{ secrets.ALWAYSDATA_SSH_KEY }}
            run: |
              mkdir -p ~/.ssh
              echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
              chmod 600 ~/.ssh/id_rsa
              ssh-keyscan -H ssh-muchacholoco.alwaysdata.net >> ~/.ssh/known_hosts          
  
          - name: Deploy files via rsync
            run: |
              rsync -avz --exclude '.git' \
                         --exclude '.github' \
                         --exclude '.gemini' \
                         --exclude 'scratch' \
                         --exclude 'deploy.sh' \
                         --exclude 'firestore.rules' \
                         --exclude '*.md' \
                         --exclude '.claude' \
                         --exclude 'node_modules' \
                         --exclude '.DS_Store' \
                         ./ muchacholoco@ssh-muchacholoco.alwaysdata.net:/home/muchacholoco/www/asistencia/
