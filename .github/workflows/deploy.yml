name: Deploy to Alwaysdata

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# ── Secrets necesarios ────────────────────────────────────────────────────────
# ALWAYSDATA_SSH_HOST  → ssh-muchacholoco.alwaysdata.net
# ALWAYSDATA_SSH_USER  → muchacholoco
# ALWAYSDATA_SSH_KEY   → clave privada SSH (ed25519, bloque completo)
# ALWAYSDATA_SITE_ID   → número del sitio (URL del panel)
# ALWAYSDATA_API_KEY   → API key de Alwaysdata
# ALWAYSDATA_ACCOUNT   → muchacholoco
# GH_PAT             → Personal Access Token con scope "repo" (para git pull)
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  deploy:
    name: 🚀 Deploy SSH → Alwaysdata
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Checkout código
        uses: actions/checkout@v4

      - name: 🔑 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.ALWAYSDATA_SSH_HOST }}
          username: ${{ secrets.ALWAYSDATA_SSH_USER }}
          key:      ${{ secrets.ALWAYSDATA_SSH_KEY }}
          port:     22
          envs:     GH_PAT,ALWAYSDATA_API_KEY,ALWAYSDATA_SITE_ID
          script: |
            set -e
            cd $HOME/prode2026
            git config core.autocrlf input
            git reset -q --hard HEAD
            git fetch -q origin main
            git reset -q --hard origin/main
            chmod +x deploy.sh
            ./deploy.sh
        env:
          GH_PAT:               ${{ secrets.GH_PAT }}
          ALWAYSDATA_API_KEY:   ${{ secrets.ALWAYSDATA_API_KEY }}
          ALWAYSDATA_SITE_ID:   ${{ secrets.ALWAYSDATA_SITE_ID }}

